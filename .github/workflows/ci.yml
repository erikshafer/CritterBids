name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

# Cancel in-progress runs for the same PR/branch when a new commit arrives.
# Pushes to `main` are allowed to run to completion so we don't lose history.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ─── Path filtering ─────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - '**/*.csproj'
              - '**/*.slnx'
              - '**/*.sln'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'global.json'
              - 'nuget.config'
              - '.editorconfig'
              - '.github/workflows/ci.yml'
            frontend:
              - 'client/**'
              - '.github/workflows/ci.yml'

  # ─── .NET build (single, shared by all test runners) ────────────────
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Publish API
        run: dotnet publish src/CritterBids.Api/CritterBids.Api.csproj --no-build --configuration ${{ env.CONFIGURATION }} --output ./publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: critterbids-api
          path: ./publish
          retention-days: 5

      - name: Archive build output for test runners
        run: >
          tar -czf dotnet-build.tar.gz
          --exclude='.git'
          --exclude='node_modules'
          --exclude='client'
          --exclude='publish'
          --exclude='docs'
          --exclude='openspec'
          --exclude='.github'
          .

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build
          path: dotnet-build.tar.gz
          retention-days: 1

  # ─── Per-BC integration tests (parallel matrix) ─────────────────────
  # if: always() ensures the matrix expands even when build is skipped
  # (e.g. frontend-only PRs), so each entry displays its proper name in
  # the GitHub checks UI instead of the raw "${{ matrix.name }}" template.
  # The gate step prevents actual test execution when there are no code
  # changes or the build did not succeed.
  test:
    name: Test — ${{ matrix.name }}
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Contracts
            project: tests/CritterBids.Contracts.Tests/CritterBids.Contracts.Tests.csproj
            trx: contracts-tests.trx
          - name: Api
            project: tests/CritterBids.Api.Tests/CritterBids.Api.Tests.csproj
            trx: api-tests.trx
          - name: Participants
            project: tests/CritterBids.Participants.Tests/CritterBids.Participants.Tests.csproj
            trx: participants-tests.trx
          - name: Selling
            project: tests/CritterBids.Selling.Tests/CritterBids.Selling.Tests.csproj
            trx: selling-tests.trx
          - name: Auctions
            project: tests/CritterBids.Auctions.Tests/CritterBids.Auctions.Tests.csproj
            trx: auctions-tests.trx
          - name: Listings
            project: tests/CritterBids.Listings.Tests/CritterBids.Listings.Tests.csproj
            trx: listings-tests.trx
          - name: Settlement
            project: tests/CritterBids.Settlement.Tests/CritterBids.Settlement.Tests.csproj
            trx: settlement-tests.trx
          - name: Obligations
            project: tests/CritterBids.Obligations.Tests/CritterBids.Obligations.Tests.csproj
            trx: obligations-tests.trx
          - name: Relay
            project: tests/CritterBids.Relay.Tests/CritterBids.Relay.Tests.csproj
            trx: relay-tests.trx
          - name: Operations
            project: tests/CritterBids.Operations.Tests/CritterBids.Operations.Tests.csproj
            trx: operations-tests.trx

    steps:
      - name: Gate — check for code changes and successful build
        id: gate
        if: needs.changes.outputs.code == 'true' && needs.build.result == 'success'
        run: echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build output
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build

      - name: Extract build output
        if: steps.gate.outputs.run == 'true'
        run: tar -xzf dotnet-build.tar.gz

      - name: Test — ${{ matrix.name }}
        if: steps.gate.outputs.run == 'true'
        run: >
          dotnet test ${{ matrix.project }}
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --logger "trx;LogFileName=${{ matrix.trx }}"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && steps.gate.outputs.run == 'true'
        with:
          name: test-results-${{ matrix.name }}
          path: ./test-results
          retention-days: 5

  # ─── Frontend (parallel per-app matrix) ─────────────────────────────
  frontend:
    name: Frontend — ${{ matrix.app }}
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: shared
            check: typecheck
          - app: bidder
            check: build-test
          - app: ops
            check: build-test
          - app: seller
            check: build-test
          - app: e2e
            check: typecheck
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (${{ matrix.app }})
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit -p ${{ matrix.app }}/tsconfig.json

      - name: Build (${{ matrix.app }})
        if: matrix.check == 'build-test'
        run: npm run build -w @critterbids/${{ matrix.app }}

      - name: Test (${{ matrix.app }})
        if: matrix.check == 'build-test'
        run: npm test -w @critterbids/${{ matrix.app }}

  # ─── Aggregator (single required status check) ─────────────────────
  # A dependent job result of `success` or `skipped` is acceptable.
  # The `test` matrix uses `if: always()` so its result is `success`
  # (all steps gated) even when skipped — build failures are caught
  # via BUILD_RESULT. The aggregator fails only when a job that
  # actually ran reports `failure` or `cancelled`.
  ci:
    name: CI
    needs: [ changes, build, test, frontend ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.test.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        run: |
          set -euo pipefail

          failed=0
          for entry in \
            "build:${BUILD_RESULT}" \
            "test:${TEST_RESULT}" \
            "frontend:${FRONTEND_RESULT}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
              echo "::error::Required job '${name}' did not succeed (result: ${result})"
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi
          echo "All required jobs passed or were skipped."
