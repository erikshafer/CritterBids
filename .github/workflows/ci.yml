name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Publish API
        run: dotnet publish src/CritterBids.Api/CritterBids.Api.csproj --no-build --configuration ${{ env.CONFIGURATION }} --output ./publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: critterbids-api
          path: ./publish
          retention-days: 5

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test — CritterBids.Contracts.Tests
        run: >
          dotnet test tests/CritterBids.Contracts.Tests/CritterBids.Contracts.Tests.csproj
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --logger "trx;LogFileName=contracts-tests.trx"
          --results-directory ./test-results

      - name: Test — Selling unit tests
        run: >
          dotnet test tests/CritterBids.Selling.Tests/CritterBids.Selling.Tests.csproj
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --filter "FullyQualifiedName~DraftListingTests|FullyQualifiedName~SubmitListingTests|FullyQualifiedName~ListingValidatorTests"
          --logger "trx;LogFileName=selling-unit-tests.trx"
          --results-directory ./test-results

      - name: Test — Participants unit tests
        run: >
          dotnet test tests/CritterBids.Participants.Tests/CritterBids.Participants.Tests.csproj
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --filter "FullyQualifiedName~SmokeTests"
          --logger "trx;LogFileName=participants-unit-tests.trx"
          --results-directory ./test-results

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./test-results
          retention-days: 5

  integration-tests:
    name: Integration — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Api
            project: tests/CritterBids.Api.Tests/CritterBids.Api.Tests.csproj
            trx: api-tests.trx
          - name: Participants
            project: tests/CritterBids.Participants.Tests/CritterBids.Participants.Tests.csproj
            trx: participants-tests.trx
          - name: Selling
            project: tests/CritterBids.Selling.Tests/CritterBids.Selling.Tests.csproj
            trx: selling-tests.trx
          - name: Auctions
            project: tests/CritterBids.Auctions.Tests/CritterBids.Auctions.Tests.csproj
            trx: auctions-tests.trx
          - name: Listings
            project: tests/CritterBids.Listings.Tests/CritterBids.Listings.Tests.csproj
            trx: listings-tests.trx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test — ${{ matrix.name }}
        run: >
          dotnet test ${{ matrix.project }}
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --logger "trx;LogFileName=${{ matrix.trx }}"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results-${{ matrix.name }}
          path: ./test-results
          retention-days: 5
