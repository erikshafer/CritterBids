name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

# Cancel in-progress runs for the same PR/branch when a new commit arrives.
# Pushes to `main` are allowed to run to completion so we don't lose history.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # The `code` filter is true when any file relevant to building or testing
          # the .NET solution has changed. Doc-only PRs (e.g. README, docs/**, *.md,
          # LICENSE, CODE_OF_CONDUCT) do not match, and the build/test jobs are
          # skipped — the final `ci` aggregator job then succeeds so branch
          # protection still passes.
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - '**/*.csproj'
              - '**/*.slnx'
              - '**/*.sln'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'global.json'
              - 'nuget.config'
              - '.editorconfig'
              - '.github/workflows/ci.yml'

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Publish API
        run: dotnet publish src/CritterBids.Api/CritterBids.Api.csproj --no-build --configuration ${{ env.CONFIGURATION }} --output ./publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: critterbids-api
          path: ./publish
          retention-days: 5

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test — CritterBids.Contracts.Tests
        run: >
          dotnet test tests/CritterBids.Contracts.Tests/CritterBids.Contracts.Tests.csproj
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --logger "trx;LogFileName=contracts-tests.trx"
          --results-directory ./test-results

      - name: Test — Selling unit tests
        run: >
          dotnet test tests/CritterBids.Selling.Tests/CritterBids.Selling.Tests.csproj
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --filter "FullyQualifiedName~DraftListingTests|FullyQualifiedName~SubmitListingTests|FullyQualifiedName~ListingValidatorTests"
          --logger "trx;LogFileName=selling-unit-tests.trx"
          --results-directory ./test-results

      - name: Test — Participants unit tests
        run: >
          dotnet test tests/CritterBids.Participants.Tests/CritterBids.Participants.Tests.csproj
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --filter "FullyQualifiedName~SmokeTests"
          --logger "trx;LogFileName=participants-unit-tests.trx"
          --results-directory ./test-results

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./test-results
          retention-days: 5

  integration-tests:
    name: Integration — ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Api
            project: tests/CritterBids.Api.Tests/CritterBids.Api.Tests.csproj
            trx: api-tests.trx
          - name: Participants
            project: tests/CritterBids.Participants.Tests/CritterBids.Participants.Tests.csproj
            trx: participants-tests.trx
          - name: Selling
            project: tests/CritterBids.Selling.Tests/CritterBids.Selling.Tests.csproj
            trx: selling-tests.trx
          - name: Auctions
            project: tests/CritterBids.Auctions.Tests/CritterBids.Auctions.Tests.csproj
            trx: auctions-tests.trx
          - name: Listings
            project: tests/CritterBids.Listings.Tests/CritterBids.Listings.Tests.csproj
            trx: listings-tests.trx
          - name: Settlement
            project: tests/CritterBids.Settlement.Tests/CritterBids.Settlement.Tests.csproj
            trx: settlement-tests.trx
          - name: Obligations
            project: tests/CritterBids.Obligations.Tests/CritterBids.Obligations.Tests.csproj
            trx: obligations-tests.trx
          - name: Relay
            project: tests/CritterBids.Relay.Tests/CritterBids.Relay.Tests.csproj
            trx: relay-tests.trx
          - name: Operations
            project: tests/CritterBids.Operations.Tests/CritterBids.Operations.Tests.csproj
            trx: operations-tests.trx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test — ${{ matrix.name }}
        run: >
          dotnet test ${{ matrix.project }}
          --no-build --configuration ${{ env.CONFIGURATION }}
          --verbosity normal
          --logger "trx;LogFileName=${{ matrix.trx }}"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results-${{ matrix.name }}
          path: ./test-results
          retention-days: 5

  # Aggregator job suitable for use as the single required status check in
  # branch protection. It succeeds when:
  #   * the PR touches no code paths (build/unit/integration jobs are skipped), or
  #   * every dependent job reports success.
  # It fails when any required job failed or was cancelled.
  ci:
    name: CI
    needs: [ changes, build, unit-tests, integration-tests ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
          BUILD_RESULT: ${{ needs.build.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
        run: |
          set -euo pipefail

          if [ "${CODE_CHANGED}" != "true" ]; then
            echo "No code changes detected; build and tests were skipped."
            exit 0
          fi

          failed=0
          for entry in \
            "build:${BUILD_RESULT}" \
            "unit-tests:${UNIT_RESULT}" \
            "integration-tests:${INTEGRATION_RESULT}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [ "${result}" != "success" ]; then
              echo "::error::Required job '${name}' did not succeed (result: ${result})"
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi
          echo "All required jobs succeeded."
