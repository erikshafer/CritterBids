name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore CritterBids.slnx

      - name: Build
        run: dotnet build CritterBids.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test CritterBids.slnx --no-build --configuration Release --verbosity normal
